const GROQ_API_KEY = process.env.GROQ_API_KEY;

async function askGroq(message) {

            method: 'POST',

    return data.choices[0].message.content;
}

askGroq('What is Ollama?')

            `// Node.js + Groq SDK
const Groq = require('groq-sdk');

const groq = new Groq({
    apiKey: process.env.GROQ_API_KEY
});

async function askGroq(message) {
    const completion = await groq.chat.completions.create({
        messages: [{ role: 'user', content: message }],
        model: 'mixtral-8x7b-32768',
        max_tokens: 500
    });

    return completion.choices[0].message.content;
}

askGroq('What is Groq?')
    .then(answer => console.log(answer));`,

        function switchLesson(index) {
            currentLesson = index;

        function showLessonModal() {
            const modal = document.getElementById('lessonModal');
            const modalBody = document.getElementById('modalBody');
            const lesson = lessons[currentLesson];
            
            modalBody.innerHTML = `
                <div class="modal-header">
                    <h2>${lesson.title}</h2>
                    <button class="modal-close" onclick="closeLessonModal()">✕</button>

                </div>

        function closeLessonModal() {
            document.getElementById('lessonModal').classList.remove('active');
        }

        function downloadCode() {
            const code = document.getElementById('codeEditor').value;
            const blob = new Blob([code], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `lesson-${currentLesson + 1}.txt`;
            a.click();
        }

        function copyCode() {
            const code = document.getElementById('codeEditor').value;
            navigator.clipboard.writeText(code).then(() => {

            document.getElementById('chatSidebar').classList.toggle('open');

            chatMessages.innerHTML = `<div class="message bot">👋 Hi! Ask me anything about this lesson.</div>`;
        }

        function sendChat() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.innerHTML += `<div class="message user">${message}</div>`;
            
            input.value = '';
